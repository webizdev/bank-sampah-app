version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: banksampah
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"

  web:
    build: .
    ports:
      - "8000:80"
    environment:
      - IS_LOCAL_DOCKER=true
    volumes:
      - .:/var/www/html
    depends_on:
      - db

